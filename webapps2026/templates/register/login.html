{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - WebApps2026{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <h4 class="mb-3 text-center"><i class="bi bi-lock"></i> Login</h4>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
            </form>
            <hr>
            <p class="text-center mb-0 small">
                Don't have an account?
                <a href="/webapps2026/register/">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
